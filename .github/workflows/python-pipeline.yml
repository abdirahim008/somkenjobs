name: Python Job Pipeline

on:
  schedule:
    - cron: '30 8 * * *'
    - cron: '30 14 * * *'
  workflow_dispatch:
    inputs:
      refresh_existing:
        description: 'Refresh current SomaliJobs URLs instead of only new jobs'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      backup_existing:
        description: 'Back up existing SomaliJobs rows before uploading refreshed formatting'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      limit:
        description: 'Optional max jobs to scrape for this run'
        required: false
        default: ''

concurrency:
  group: python-job-pipeline
  cancel-in-progress: false

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: scripts/python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/python/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Run scraper pipeline
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.refresh_existing }}" = "true" ]; then
            ARGS="$ARGS --refresh-existing"
          fi
          if [ "${{ github.event.inputs.backup_existing }}" = "true" ]; then
            ARGS="$ARGS --backup-existing"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          python pipeline.py $ARGS
        env:
          SOMKEN_URL: ${{ secrets.SOMKEN_URL }}
          SOMKEN_EMAIL: ${{ secrets.SOMKEN_EMAIL }}
          SOMKEN_PASSWORD: ${{ secrets.SOMKEN_PASSWORD }}
          SOMKEN_TOKEN: ${{ secrets.SOMKEN_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATA_DIR: ${{ runner.temp }}/somken-python-data
