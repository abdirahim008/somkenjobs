name: Python Job Pipeline

on:
  schedule:
    - cron: '30 8 * * *'
    - cron: '30 14 * * *'
  workflow_dispatch:

concurrency:
  group: python-job-pipeline
  cancel-in-progress: false

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: scripts/python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/python/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Run scraper pipeline
        run: python pipeline.py
        env:
          SOMKEN_URL: ${{ secrets.SOMKEN_URL }}
          SOMKEN_EMAIL: ${{ secrets.SOMKEN_EMAIL }}
          SOMKEN_PASSWORD: ${{ secrets.SOMKEN_PASSWORD }}
          SOMKEN_TOKEN: ${{ secrets.SOMKEN_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATA_DIR: ${{ runner.temp }}/somken-python-data
