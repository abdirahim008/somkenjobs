name: Fetch Jobs

on:
  workflow_dispatch:        # Manual emergency trigger only; Python Job Pipeline is the scheduled importer.

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run job fetcher
        run: npx tsx scripts/fetchJobs.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
